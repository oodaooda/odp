services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odp}
      POSTGRES_DB: ${POSTGRES_DB:-odp}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
