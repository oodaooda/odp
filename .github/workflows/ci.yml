name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          python-version: "3.11"
          activate-environment: odp
          auto-activate-base: false

      - name: Install
        shell: bash -l {0}
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Lint
        shell: bash -l {0}
        run: |
          python -m pip install ruff
          ruff check services/ tests/ --select E,F,W --ignore E501

      - name: Test
        shell: bash -l {0}
        run: |
          ODP_AGENT_TEST_MODE=1 ODP_FAKE_REDIS=1 pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
